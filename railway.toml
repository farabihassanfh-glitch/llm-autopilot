[build]
builder = "nixpacks"

[deploy]
startCommand = "/opt/venv/bin/python -m classifier.train && /opt/venv/bin/uvicorn api.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"

# Persistent volume: add a volume in Railway dashboard mounted at /data
# This keeps logs/requests.db across redeploys
